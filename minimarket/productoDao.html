<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/estiloMenu.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <h1 class="header__titulo">CAMVELS</h1>
    </header>
    <main class="presentacion">
        <section class="presentacion__menu">
            <div class="presentacion__menu__paginas">
                <a class="presentacion__menu__paginas__link" href="productos.html" >Productos</a>
                <a class="presentacion__menu__paginas__link" href="ventas.html">Ventas</a>
                <a class="presentacion__menu__paginas__link" href="compras.html">Compras</a>
                <a class="presentacion__menu__paginas__link" href="empleados.html">Empleados</a>
                <a class="presentacion__menu__paginas__link" href="proveedores.html">Proveedores</a>
                <a class="presentacion__menu__paginas__link" href="reportes.html">Reportes</a>
            </div>
        </section>
        <section class="presentacion__contenido">
            <h2 class="presentacion__contenido__titulo">Editar Producto</h2>
            <div class="presentacion__contenido__card">
                <table class="presentacion__contenido__card__tabla">
                <tr class="presentacion__contenido__card__tabla__fila">
                    <th>Producto:</th>
                    <td><input type="text" value="Leche Gloria Azul"></td>
                    
                </tr>
                <tr class="presentacion__contenido__card__tabla__fila">
                    <th>Categoría:</th>
                    <td><select name="pago" class="presentacion__contenido__card__tabla__fila__select">
                            <option value="efectivo">Lacteos</option>
                            <option value="yape">Pastas</option>
                        </select>
                    </td>
                </tr>
                <tr class="presentacion__contenido__card__tabla__fila">
                    <th>Proveedor:</th>
                    <td><input type="text" value="Gloria SAC"></td>
                </tr>
                <tr class="presentacion__contenido__card__tabla__fila">
                    <th>Stock:</th>
                    <td><input type="text" value="7" readonly></td>
                </tr>
                <tr class="presentacion__contenido__card__tabla__fila">
                    <th>Precio venta:</th>
                    <td><input type="text" value="S/ 3.50"></td>
                </tr>
                <tr class="presentacion__contenido__card__tabla__fila">
                    <th>Precio compra:</th>
                    <td><input type="text" value="S/ 2.90"></td>
                </tr>
                <tr class="presentacion__contenido__card__tabla__fila">
                    <td class="presentacion__contenido__card__tabla__fila__a" colspan="2">
                        <button class="presentacion__contenido__card__tabla__fila__boton">Enviar</button>
                    </td>
                </tr>
                </table>
            </div>
        </section>
    </main>
</body>
</html>
